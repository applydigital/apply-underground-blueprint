<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Deliverable map</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Wix+Madefor+Text:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css?v=4">
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <img class="logo" src="logo.svg" alt="" onerror="this.onerror=null;this.src='logo.png';this.addEventListener('error',()=>{this.style.display='none';},{once:true});">
      <div class="brand-text">
        <h1>Apply Underground</h1>
        <span class="sub">Deliverable map</span>
      </div>
    </div>
    <div class="actions">
      <select class="filter-select" id="layerFilter" aria-label="ACx Architecture Map layer">
        <option value="all">All layers</option>
        <option value="strategy">Strategy</option>
        <option value="experience">Experience</option>
        <option value="data">Data</option>
        <option value="technology">Technology</option>
        <option value="governance">Governance</option>
      </select>
      <select class="filter-select" id="engFilter" aria-label="Engagement type">
        <option value="all">All engagements</option>
        <option value="strategy">Strategy-Led</option>
        <option value="delivery">Delivery-Led</option>
      </select>
      <select class="filter-select" id="templates" aria-label="Templates">
        <option value="">Templates…</option>
      </select>
      <button class="conn-btn" id="connBtn" title="Show connection lines">Connections</button>
      <button class="zoom-btn" id="zoomBtn" title="Toggle zoom">
        <svg width="13" height="13" viewBox="0 0 13 13" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round">
          <circle cx="5.5" cy="5.5" r="4"/>
          <line x1="8.5" y1="8.5" x2="12" y2="12"/>
          <line x1="3.5" y1="5.5" x2="7.5" y2="5.5"/>
          <line x1="5.5" y1="3.5" x2="5.5" y2="7.5" id="zoomPlusV"/>
        </svg>
        <span id="zoomLabel">50%</span>
      </button>
      <span class="selcount" id="selcount"></span>
      <button class="clear" id="clear" disabled>Clear</button>
    </div>
  </header>

  <main class="canvas" id="canvas">
    <div class="stage-wrap" id="stageWrap">
      <svg class="lines" id="lines" preserveAspectRatio="none">
        <defs>
          <!-- Arrow marker colors must match --color-primary and --color-secondary in styles.css -->
          <marker id="arrow-default" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
            <path d="M0 0 L10 5 L0 10 z" fill="#9E9E9E"/>
          </marker>
          <marker id="arrow-in" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
            <path d="M0 0 L10 5 L0 10 z" fill="#DD3202"/>
          </marker>
          <marker id="arrow-in-t" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5.5" markerHeight="5.5" orient="auto-start-reverse">
            <path d="M0 0 L10 5 L0 10 z" fill="#DD3202" fill-opacity="0.4"/>
          </marker>
          <marker id="arrow-out" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
            <path d="M0 0 L10 5 L0 10 z" fill="#2F3131"/>
          </marker>
        </defs>
      </svg>
    </div>
  </main>

  <div class="tray-scrim" id="trayScrim"></div>
  <aside class="tray" id="tray" aria-hidden="true">
    <div class="tray-head">
      <div class="heading">
        <div class="eyebrow" id="trayEyebrow"></div>
        <h2 id="trayTitle"></h2>
      </div>
      <button class="close" id="trayClose" aria-label="Close">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none"><path d="M5 5l10 10M15 5L5 15" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
      </button>
    </div>
    <div class="tray-body" id="trayBody"></div>
  </aside>

  <div class="statusbar">
    <div class="statusbar-legends">
      <div class="legend">
        <span><svg viewBox="0 0 22 6"><line x1="0" y1="3" x2="22" y2="3" stroke="#916F67" stroke-width="1.4"/></svg>Required</span>
        <span><svg viewBox="0 0 22 6"><line x1="0" y1="3" x2="22" y2="3" stroke="#916F67" stroke-width="1.4" stroke-dasharray="3 3"/></svg>Optional</span>
      </div>
      <span class="sep">·</span>
      <div class="legend">
        <span><span class="swatch swatch--in"></span>Inputs</span>
        <span><span class="swatch swatch--out"></span>Outputs</span>
        <span>faded = indirect</span>
      </div>
      <span class="sep">·</span>
      <div class="legend">
        <span><span class="eng-badge eng-s">S</span>Strategy</span>
        <span><span class="eng-badge eng-d">D</span>Delivery</span>
      </div>
    </div>
    <span class="tip">Scroll to pan · click to trace · ⌘-click to select full required chain · multi-select to build a scope</span>
  </div>

<script src="app.js?v=28"></script>
</body>
</html>
